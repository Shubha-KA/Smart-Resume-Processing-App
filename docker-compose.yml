services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: smart-resume-azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite-data:/data
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --location /data

volumes:
  azurite-data:
